<!doctype html>
<html lang="zh-Hant" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="會議翻譯" />
  <link rel="apple-touch-icon" href="icon-180.png?v=2" />
  <link rel="icon" type="image/svg+xml" href="icon-180.svg" />
  <title>會議翻譯 | 中菲即時口譯</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ===== Dark theme (default) ===== */
    [data-theme="dark"]{
      --bg:#0a0c10;
      --panel:rgba(255,255,255,0.05);
      --panel2:rgba(255,255,255,0.02);
      --border:rgba(255,255,255,0.08);
      --muted:rgba(255,255,255,0.6);
      --text:rgba(255,255,255,0.92);
      --danger:rgba(248,113,113,0.95);
      --dangerBg:rgba(248,113,113,0.10);
      --dangerBd:rgba(248,113,113,0.25);
      --success:rgba(16,185,129,0.95);
      --successBg:rgba(16,185,129,0.12);
      --blue:rgba(96,165,250,0.95);
      --blueBg:rgba(96,165,250,0.10);
      --blueBd:rgba(96,165,250,0.30);
      --chipBg:rgba(0,0,0,0.35);
      --chipBd:rgba(255,255,255,0.10);
      --focus:rgba(255,255,255,0.18);
      --toastBg:rgba(20,22,28,0.95);
      --toastBd:rgba(255,255,255,0.12);
      --skelBar:rgba(255,255,255,0.06);
      --outColor:rgba(130,177,255,0.95);
      --accent:#6ee7b7;
      --accentBg:rgba(110,231,183,0.10);
      --accentBd:rgba(110,231,183,0.30);
      --twTextColor:#86efac;
      --filTextColor:#93c5fd;
      --twColor:#34d399;
      --filColor:#f472b6;
      --logBg:rgba(255,255,255,0.03);
      --summaryBg:rgba(255,255,255,0.04);
      --micBd:rgba(255,255,255,0.12);
      --micBg:linear-gradient(135deg,rgba(255,255,255,0.10) 0%,rgba(255,255,255,0.04) 40%,rgba(255,255,255,0.02) 60%,rgba(255,255,255,0.07) 100%);
    }

    /* ===== Light theme ===== */
    [data-theme="light"]{
      --bg:#f4f5f7;
      --panel:rgba(0,0,0,0.03);
      --panel2:rgba(0,0,0,0.01);
      --border:rgba(0,0,0,0.08);
      --muted:rgba(0,0,0,0.50);
      --text:rgba(0,0,0,0.88);
      --danger:rgba(220,53,69,0.95);
      --dangerBg:rgba(220,53,69,0.08);
      --dangerBd:rgba(220,53,69,0.25);
      --success:rgba(22,163,74,0.95);
      --successBg:rgba(22,163,74,0.10);
      --blue:rgba(59,130,246,0.95);
      --blueBg:rgba(59,130,246,0.08);
      --blueBd:rgba(59,130,246,0.25);
      --chipBg:rgba(0,0,0,0.05);
      --chipBd:rgba(0,0,0,0.10);
      --focus:rgba(0,0,0,0.12);
      --toastBg:rgba(255,255,255,0.96);
      --toastBd:rgba(0,0,0,0.10);
      --skelBar:rgba(0,0,0,0.07);
      --outColor:rgba(37,99,235,0.95);
      --accent:#059669;
      --accentBg:rgba(5,150,105,0.08);
      --accentBd:rgba(5,150,105,0.25);
      --twTextColor:#166534;
      --filTextColor:#1e40af;
      --twColor:#059669;
      --filColor:#db2777;
      --logBg:rgba(0,0,0,0.02);
      --summaryBg:rgba(0,0,0,0.03);
      --micBd:rgba(0,0,0,0.08);
      --micBg:linear-gradient(135deg,rgba(255,255,255,0.6) 0%,rgba(255,255,255,0.3) 50%,rgba(255,255,255,0.5) 100%);
    }

    :root{--radius:16px}

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0}
    body{
      background:var(--bg);
      color:var(--text);
      font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
      -webkit-font-smoothing:antialiased;
      overscroll-behavior:none;
    }

    .wrap{
      max-width:540px;
      margin:0 auto;
      padding:6px;
      padding-top:max(6px, env(safe-area-inset-top));
      padding-bottom:max(6px, env(safe-area-inset-bottom));
      height:100vh;
      height:100dvh;
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    /* ===== Top bar ===== */
    .toprow{
      display:flex;
      align-items:center;
      gap:4px;
      flex-shrink:0;
    }
    .app-title{
      font-size:12px;
      font-weight:600;
      color:var(--muted);
      letter-spacing:0.3px;
      white-space:nowrap;
    }

    /* ===== Buttons ===== */
    .icon{
      border:0;
      background:transparent;
      color:var(--muted);
      border-radius:10px;
      padding:10px 12px;
      font-size:14px;
      line-height:1;
      cursor:pointer;
      transition:opacity 100ms, background 100ms;
      white-space:nowrap;
      -webkit-user-select:none;
      user-select:none;
      min-width:44px;
      min-height:44px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .icon:hover{background:rgba(128,128,128,0.08)}
    .icon:active{background:rgba(128,128,128,0.15)}
    .icon.active{color:var(--accent);font-weight:600}

    /* ===== Speaker zone ===== */
    .zone{
      display:flex;
      flex-direction:column;
      gap:4px;
      flex:1;
      min-height:0;
    }
    .zone-fil{
      transform:rotate(180deg);
    }

    .zone-label{
      display:flex;
      align-items:center;
      gap:8px;
      padding:0 4px;
      flex-shrink:0;
    }
    .zone-label .tag{
      font-size:12px;
      font-weight:600;
      padding:2px 10px;
      border-radius:8px;
      letter-spacing:0.5px;
    }
    .tag-tw{background:rgba(110,231,183,0.15);color:var(--twColor)}
    .tag-fil{background:rgba(249,168,212,0.15);color:var(--filColor)}
    [data-theme="light"] .tag-tw{background:rgba(5,150,105,0.12)}
    [data-theme="light"] .tag-fil{background:rgba(219,39,119,0.12)}

    .zone-label .status-text{
      font-size:11px;
      color:var(--muted);
    }

    /* ===== Display panel (translation result) ===== */
    .display{
      flex:1;
      min-height:0;
      border-radius:var(--radius);
      background:linear-gradient(180deg, var(--panel), var(--panel2));
      border:1px solid var(--border);
      overflow:auto;
      padding:14px 18px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .display .translated{
      font-size:28px;
      font-weight:600;
      line-height:1.6;
      letter-spacing:0.01em;
      word-break:break-word;
      white-space:pre-wrap;
    }
    /* TW zone text: green tone */
    #displayTw .translated{
      color:var(--twTextColor);
      font-family:"Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
    }
    /* FIL zone text: blue tone */
    #displayFil .translated{
      color:var(--filTextColor);
      font-family:system-ui, -apple-system, sans-serif;
    }
    .display .original{
      font-size:15px;
      color:var(--muted);
      opacity:0.8;
      line-height:1.6;
      word-break:break-word;
      white-space:pre-wrap;
    }
    .display .placeholder{
      color:var(--muted);
      opacity:0.3;
      font-style:italic;
      font-size:18px;
    }

    /* Loading skeleton */
    @keyframes skeleton-pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
    .display.loading .translated::before{
      content:"";
      display:block;
      height:34px;
      width:70%;
      background:var(--skelBar);
      border-radius:6px;
      animation:skeleton-pulse 1.5s ease-in-out infinite;
    }

    /* Recording border */
    .display.recording-active{
      border-color:rgba(220,38,38,0.8);
      box-shadow:0 0 18px rgba(220,38,38,0.35);
      animation:recording-border 1s ease-in-out infinite;
    }
    @keyframes recording-border{
      0%,100%{border-color:rgba(220,38,38,0.8);opacity:1}
      50%{border-color:rgba(220,38,38,0.3);opacity:0.7}
    }

    /* Speaking glow */
    .display.speaking-glow{
      border-color:var(--accentBd);
      box-shadow:0 0 20px rgba(110,231,183,0.2);
    }

    /* ===== Mic button ===== */
    .btn-mic{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 10px;
      border:1px solid var(--micBd);
      border-radius:var(--radius);
      font-size:15px;
      font-weight:600;
      font-family:inherit;
      cursor:pointer;
      -webkit-user-select:none;
      user-select:none;
      transition:box-shadow 200ms, transform 80ms, border-color 200ms, background 200ms;
      background:var(--micBg);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      color:var(--text);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.12),inset 0 -1px 0 rgba(0,0,0,0.08),0 2px 8px rgba(0,0,0,0.12);
      flex-shrink:0;
    }
    .btn-mic:active{transform:scale(0.97)}

    .btn-mic.mic-pending{
      border-color:rgba(220,38,38,0.4);
      background:linear-gradient(135deg,rgba(220,38,38,0.25) 0%,rgba(239,68,68,0.30) 50%,rgba(220,38,38,0.25) 100%);
      color:rgba(255,255,255,0.8);
      animation:mic-pending-pulse 1s ease-in-out infinite;
    }
    @keyframes mic-pending-pulse{0%,100%{opacity:0.7}50%{opacity:1}}

    .btn-mic.recording{
      border-color:rgba(220,38,38,0.8);
      background:linear-gradient(135deg,rgba(220,38,38,0.85) 0%,rgba(239,68,68,0.90) 50%,rgba(220,38,38,0.85) 100%);
      color:#fff;
      box-shadow:0 0 28px rgba(220,38,38,0.55);
      animation:mic-pulse 1.5s ease-in-out infinite;
    }
    @keyframes mic-pulse{
      0%,100%{opacity:0.85}
      50%{opacity:1}
    }
    .btn-mic:disabled{opacity:0.35;cursor:not-allowed;animation:none}

    /* ===== Divider ===== */
    .divider{
      width:100%;
      height:1px;
      background:var(--border);
      flex-shrink:0;
    }

    /* ===== Conversation log (inside overlay) ===== */
    .log-list{
      display:flex;
      flex-direction:column;
      gap:6px;
      padding:6px;
    }
    .log-entry{
      padding:8px 12px;
      border-radius:12px;
      background:var(--logBg);
      border:1px solid var(--border);
      font-size:13px;
      line-height:1.6;
    }
    .log-entry .log-speaker{
      font-weight:600;
      font-size:12px;
      margin-bottom:2px;
    }
    .log-entry .log-speaker.tw{color:var(--twColor)}
    .log-entry .log-speaker.fil{color:var(--filColor)}
    .log-entry .log-original{color:var(--text);opacity:0.9}
    .log-entry .log-translated{color:var(--outColor);font-size:12px;margin-top:2px;opacity:0.8}
    .log-empty{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      opacity:0.4;
      padding:12px;
    }

    /* ===== Summary overlay ===== */
    .overlay{
      position:fixed;inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,0.6);
      z-index:50;
      padding:16px;
    }
    .overlay.show{display:flex}
    .modal{
      width:100%;
      max-width:480px;
      max-height:80vh;
      background:var(--bg);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .modal-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px 20px;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .modal-title{font-size:18px;font-weight:700}
    .modal-close{
      background:none;
      border:1px solid var(--border);
      color:var(--muted);
      font-size:14px;
      font-weight:600;
      font-family:inherit;
      cursor:pointer;
      padding:8px 16px;
      border-radius:10px;
      line-height:1;
    }
    .modal-close:hover{background:var(--panel)}
    .modal-body{
      flex:1;
      overflow:auto;
      padding:20px;
    }
    .summary-content{
      font-size:14px;
      line-height:1.8;
      word-break:break-word;
    }
    .summary-content:empty::before{
      content:"點擊「產生摘要」開始分析對話紀錄…";
      color:var(--muted);
      opacity:0.4;
      font-style:italic;
    }
    .summary-content h3{
      font-size:15px;
      font-weight:700;
      margin:18px 0 8px;
      padding-bottom:4px;
      border-bottom:1px solid var(--border);
      color:var(--accent);
    }
    .summary-content h3:first-child{margin-top:0}
    .summary-content p{margin:6px 0}
    .summary-content ul{
      margin:6px 0;
      padding-left:20px;
    }
    .summary-content li{margin:3px 0}
    .summary-content strong{color:var(--text);font-weight:600}
    .summary-content table{
      width:100%;
      border-collapse:collapse;
      margin:10px 0;
      font-size:13px;
    }
    .summary-content th{
      text-align:left;
      padding:6px 8px;
      border-bottom:2px solid var(--border);
      color:var(--accent);
      font-weight:600;
      font-size:12px;
    }
    .summary-content td{
      padding:5px 8px;
      border-bottom:1px solid var(--border);
    }
    .summary-content tr:last-child td{border-bottom:none}
    .modal-footer{
      padding:12px 20px;
      border-top:1px solid var(--border);
      display:flex;
      gap:8px;
      flex-shrink:0;
    }
    .btn-summary-gen{
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      background:var(--accent);
      color:#000;
      font-size:14px;
      font-weight:600;
      font-family:inherit;
      cursor:pointer;
    }
    .btn-summary-gen:disabled{opacity:0.4;cursor:not-allowed}
    .btn-summary-copy{
      padding:12px 16px;
      border:1px solid var(--border);
      border-radius:10px;
      background:var(--panel);
      color:var(--muted);
      font-size:14px;
      font-weight:500;
      font-family:inherit;
      cursor:pointer;
    }
    .btn-summary-copy:hover{background:var(--focus)}

    /* ===== Settings overlay ===== */
    .settings-modal{
      width:100%;
      max-width:420px;
      padding:32px 24px;
    }
    .settings-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:24px;
    }
    .settings-title{font-size:22px;font-weight:700}
    .settings-prompt{
      font-size:15px;
      color:var(--accent);
      text-align:center;
      margin-bottom:20px;
      font-weight:500;
    }
    .field{
      display:grid;
      gap:6px;
      margin-top:10px;
      padding:10px;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--panel);
    }
    .field label{font-size:12px;color:var(--muted)}
    .in{
      width:100%;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(128,128,128,0.06);
      color:var(--text);
      padding:12px;
      outline:none;
      font-size:16px;
      font-family:inherit;
    }
    .in:focus{border-color:var(--focus)}
    .hint{font-size:11px;color:var(--muted);opacity:0.7;padding:4px 6px}
    .hint a{color:var(--accent);text-decoration:none}
    .hint a:hover{text-decoration:underline}
    .btn-verify{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:var(--accent);
      color:#000;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      margin-top:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .btn-verify:disabled{opacity:0.5;cursor:not-allowed}
    .btn-verify.verifying{opacity:0.7;pointer-events:none}
    .verify-dot{
      width:10px;height:10px;
      border-radius:50%;
      background:currentColor;
      display:none;
    }
    .btn-verify.verifying .verify-dot{
      display:inline-block;
      animation:blink 0.6s infinite alternate;
    }
    @keyframes blink{0%{opacity:1}100%{opacity:0.2}}
    .verify-result{
      font-size:13px;
      text-align:center;
      margin-top:8px;
      min-height:20px;
    }
    .verify-result.success{color:#22c55e}
    .verify-result.fail{color:var(--danger)}

    /* ===== Toast ===== */
    #toastHost{
      position:fixed;
      bottom:max(16px, env(safe-area-inset-bottom, 16px));
      left:50%;
      transform:translateX(-50%);
      z-index:9999;
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:center;
      pointer-events:none;
      max-width:340px;
      width:90%;
    }
    .toast-item{
      background:var(--toastBg);
      color:var(--muted);
      border:1px solid var(--toastBd);
      border-radius:12px;
      padding:10px 16px;
      font-size:13px;
      line-height:1.5;
      box-shadow:0 4px 16px rgba(0,0,0,0.3);
      opacity:0;
      transform:translateY(8px);
      transition:opacity 120ms ease,transform 120ms ease;
      pointer-events:auto;
      cursor:pointer;
      text-align:center;
    }
    .toast-item.show{opacity:1;transform:translateY(0)}
    .toast-item.out{opacity:0;transform:translateY(8px)}
    .toast-item.toast-error{border-color:var(--dangerBd);background:var(--dangerBg);color:var(--danger)}

    /* ===== Summary section inside log overlay ===== */
    .log-count-header{
      font-size:13px;
      color:var(--muted);
      opacity:0.6;
      margin-left:6px;
    }
    .summary-section{
      margin-top:16px;
      padding-top:16px;
      border-top:1px solid var(--border);
    }
    .summary-divider{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      opacity:0.5;
      margin-bottom:12px;
    }

    /* ===== Play button (floating mini circle) ===== */
    .display{position:relative}
    .btn-play{
      position:absolute;
      bottom:10px;
      right:10px;
      width:44px;
      height:44px;
      padding:0;
      border:1px solid var(--accentBd);
      border-radius:50%;
      background:var(--accentBg);
      color:var(--accent);
      font-size:18px;
      line-height:1;
      cursor:pointer;
      -webkit-user-select:none;
      user-select:none;
      transition:opacity 150ms;
      z-index:2;
    }
    .btn-play:active{opacity:0.7}
    .btn-play.playing{
      border-color:var(--dangerBd);
      background:var(--dangerBg);
      color:var(--danger);
    }

    /* ===== Status text (standalone, no zone-label wrapper) ===== */
    .status-text{
      font-size:11px;
      color:var(--muted);
      padding:0 4px;
      flex-shrink:0;
      min-height:14px;
    }

    /* ===== Editable translated text ===== */
    .translated[contenteditable="true"]{
      cursor:text;
      outline:none;
      border-radius:8px;
      padding:4px 6px;
      margin:-4px -6px;
      transition:background 150ms;
    }
    .translated[contenteditable="true"]:focus{
      background:rgba(128,128,128,0.08);
    }
    .translated[contenteditable="true"]:empty::before{
      content:"點此輸入文字…";
      color:var(--muted);
      opacity:0.4;
      font-style:italic;
      font-size:20px;
      pointer-events:none;
    }

    /* Translate mode button */
    .btn-mic.translate-mode{
      border-color:var(--accentBd);
      background:linear-gradient(135deg,rgba(110,231,183,0.20) 0%,rgba(110,231,183,0.10) 100%);
      color:var(--accent);
    }

    @media (prefers-reduced-motion: reduce){
      .btn-mic.recording,.btn-mic.mic-pending,.display.recording-active{animation:none}
      .display.loading .translated::before{animation:none;opacity:0.5}
    }
  </style>
</head>
<body>

  <!-- Settings overlay -->
  <div class="overlay" id="settingsOverlay" aria-hidden="true">
    <div class="settings-modal" role="dialog" aria-modal="true">
      <div class="settings-header">
        <div class="settings-title">設定</div>
        <button class="modal-close" id="btnCloseSettings">關閉</button>
      </div>
      <div class="settings-prompt" id="settingsPrompt">請輸入 OpenAI API Key</div>
      <div class="field">
        <label for="apiKey">OpenAI API Key</label>
        <input class="in" id="apiKey" type="password" placeholder="sk-…" autocomplete="off" />
